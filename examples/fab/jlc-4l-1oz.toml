# JLCPCB 4-layer 1oz baseline: the free-via envelope + tented covering.
# A profile is ONE vendor capability revision with evidence — when the vendor
# page changes, cut a NEW file (new id), never mutate an old revision.

id = "jlc-4l-1oz-free-vias-2026-07"
vendor = "JLCPCB"

[source]
urls = [
  "https://jlcpcb.com/hk/help/article/pcb-via-covering",
  "https://jlcpcb.com/hk/help/article/in-what-cases-will-there-be-charged-extra",
]
retrieved_at = "2026-07-14"

[stackup]
layers = 4
thickness_mm = 1.0

[via]
covering = "tented"
min_drill_mm = 0.30            # below: paid small-via process
min_pad_mm = 0.40
preferred_annular_mm = 0.075   # recommended margin: 0.30/0.45
max_tented_drill_mm = 0.40     # tenting caps the drill
forbid_via_in_pad = true
forbid_blind_buried = true

[cost.warn_if]
board_length_mm_gte = 600
board_area_cm2_gt = 650
drill_density_per_m2_gt = 150000
trace_width_mm_lte = 0.0889    # 3.5 mil fine-line surcharge (multilayer)

# Approved exceptions are explicit, owned and expiring — never a shrug.
# [[exception]]
# type = "thermal_via"
# component = "U1"
# owner = "hw-lead"
# reason = "QFN exposed-pad thermal vias per datasheet layout guide"
# expires = "2027-01-01"
