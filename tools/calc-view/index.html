<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>akcli calc — engineering calculators</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#232629; --panel:#2d3135; --panel2:#26292c; --border:#3f4448;
  --text:#d6d8da; --muted:#9aa0a6; --accent:#4aa3ff; --accent2:#8be0ff;
  --copper:#d9903f; --board:#2f6b3f; --err:#ff7b72; --ok:#7ee787;
}
*{box-sizing:border-box}
body{margin:0;font:14px/1.45 "SF Mono",Menlo,Consolas,monospace;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
#side{width:250px;min-width:250px;background:var(--panel2);border-right:1px solid var(--border);overflow-y:auto;padding:10px 0}
#side h1{font-size:15px;margin:4px 14px 10px;color:var(--accent2)}
#side .sub{font-size:11px;color:var(--muted);margin:0 14px 10px}
#filter{width:calc(100% - 28px);margin:0 14px 10px;padding:6px 8px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font:inherit}
.group{margin:8px 0 2px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.calc-btn{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);padding:5px 14px 5px 22px;cursor:pointer;font:inherit;border-left:3px solid transparent}
.calc-btn:hover{background:#33383d}
.calc-btn.active{background:#1f3a55;border-left-color:var(--accent);color:#fff}
#main{flex:1;overflow-y:auto;padding:18px 26px}
h2{margin:0 0 2px;font-size:19px;color:#fff}
#ref{font-size:12px;color:var(--muted);margin-bottom:14px;max-width:900px}
#ref b{color:var(--accent2);font-weight:normal}
#notes{font-size:12px;color:#c8b46a;margin:-6px 0 14px;max-width:900px}
#content{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start}
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px}
#formcard{min-width:380px;flex:0 1 430px}
#diagcard{flex:1 1 420px;min-width:380px;display:flex;flex-direction:column;align-items:center}
#diagcard svg{max-width:100%;height:auto}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.prow label{width:132px;color:var(--accent2);text-align:right}
.prow input,.prow select{flex:1;padding:6px 8px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:4px;font:inherit}
.prow input:focus,.prow select:focus{outline:1px solid var(--accent)}
.prow .unit{width:46px;color:var(--muted)}
.prow .req{color:var(--err)}
.phelp{font-size:11px;color:var(--muted);margin:-5px 0 8px 140px}
#runbtn{margin-top:8px;padding:8px 26px;background:#1f4f82;border:1px solid var(--accent);color:#fff;border-radius:5px;cursor:pointer;font:inherit;font-weight:bold}
#runbtn:hover{background:#2a63a0}
.hint{font-size:11px;color:var(--muted);margin-top:8px}
#results{margin-top:16px;width:100%}
#results table{border-collapse:collapse;width:100%}
#results td,#results th{border:1px solid var(--border);padding:5px 10px;text-align:left;font:inherit}
#results th{background:var(--panel2);color:var(--accent2);font-weight:normal}
#results .val{color:#fff;white-space:nowrap}
#results .note{color:var(--muted);font-size:12px}
#error{color:var(--err);margin-top:12px;white-space:pre-wrap}
.subtable{margin:4px 0}
.subtable td,.subtable th{font-size:12px !important;padding:3px 8px !important}
#empty{color:var(--muted);margin-top:40vh;text-align:center;width:100%}
.svgcap{font-size:11px;color:var(--muted);margin-top:6px;text-align:center}
</style>
</head>
<body>
<nav id="side">
  <h1>akcli calc</h1>
  <div class="sub">standards-cited calculators<br>every result carries its reference</div>
  <input id="filter" placeholder="filter…" oninput="renderSide()">
  <div id="calclist"></div>
</nav>
<main id="main">
  <div id="empty">← pick a calculator</div>
  <div id="page" style="display:none">
    <h2 id="title"></h2>
    <div id="ref"></div>
    <div id="notes"></div>
    <div id="content">
      <div class="card" id="formcard">
        <div id="form"></div>
        <button id="runbtn" onclick="run()">Calculate</button>
        <div class="hint">engineering notation ok: 4k7 · 100n · 35u · 2M2 · 1e-7</div>
        <div id="error"></div>
        <div id="results"></div>
      </div>
      <div class="card" id="diagcard">
        <div id="diagram"></div>
        <div class="svgcap" id="diagcap"></div>
      </div>
    </div>
  </div>
</main>
<script>
"use strict";
let REG = null, current = null;

/* ---------------- engineering formatting (mirror of calc/si.py) ------- */
const PREFIXABLE = new Set(["Ω","V","A","W","F","H","Hz","s","m"]);
const STEPS = [[1e9,"G"],[1e6,"M"],[1e3,"k"],[1,""],[1e-3,"m"],[1e-6,"µ"],[1e-9,"n"],[1e-12,"p"]];
function fmt(v, unit){
  if (typeof v !== "number") return String(v);
  if (!unit) return Number(v.toPrecision(6)).toString();
  if (!PREFIXABLE.has(unit)) return Number(v.toPrecision(6)) + " " + unit;
  if (v === 0) return "0 " + unit;
  const a = Math.abs(v);
  for (const [s,p] of STEPS)
    if (a >= s) return Number((v/s).toPrecision(5)) + " " + p + unit;
  return Number(v.toPrecision(5)) + " " + unit;
}

/* ---------------- sidebar ---------------------------------------------- */
function store(key, dflt){ try { return JSON.parse(localStorage.getItem(key)) ?? dflt; } catch(e){ return dflt; } }
function save(key, v){ try { localStorage.setItem(key, JSON.stringify(v)); } catch(e){} }
function allCalcs(){ return Object.values(REG.groups).flat(); }
function byName(n){ return allCalcs().find(c => c.name === n); }

async function boot(){
  REG = await (await fetch("/api/list")).json();
  renderSide();
  // URL share: #calc=<name>&k=v... selects, fills, and runs
  const h = new URLSearchParams(location.hash.replace(/^#/, ""));
  const c = byName(h.get("calc"));
  if (c){
    select(c);
    document.querySelectorAll("#form [data-param]").forEach(el => {
      const v = h.get(el.dataset.param);
      if (v !== null) el.value = v;
    });
    run();
  }
}
function pinToggle(name){
  const pins = store("akcli-pins", []);
  const i = pins.indexOf(name);
  if (i >= 0) pins.splice(i, 1); else pins.push(name);
  save("akcli-pins", pins);
  renderSide(); updatePinBtn();
}
function noteRecent(name){
  let r = store("akcli-recent", []).filter(n => n !== name);
  r.unshift(name);
  save("akcli-recent", r.slice(0, 8));
}
function addBtn(box, c){
  const b = document.createElement("button");
  b.className = "calc-btn" + (current && current.name === c.name ? " active" : "");
  b.textContent = c.name;
  b.title = c.title;
  b.onclick = () => select(c);
  box.appendChild(b);
}
function renderSide(){
  const q = document.getElementById("filter").value.toLowerCase();
  const box = document.getElementById("calclist");
  box.innerHTML = "";
  if (!q){
    const pins = store("akcli-pins", []).map(byName).filter(Boolean);
    const recent = store("akcli-recent", []).map(byName)
                   .filter(c => c && !store("akcli-pins", []).includes(c.name));
    if (pins.length){
      const g = document.createElement("div"); g.className = "group"; g.textContent = "★ pinned";
      box.appendChild(g); pins.forEach(c => addBtn(box, c));
    }
    if (recent.length){
      const g = document.createElement("div"); g.className = "group"; g.textContent = "recent";
      box.appendChild(g); recent.slice(0, 5).forEach(c => addBtn(box, c));
    }
  }
  for (const [group, calcs] of Object.entries(REG.groups)){
    const hits = calcs.filter(c => !q || c.name.includes(q) || c.title.toLowerCase().includes(q));
    if (!hits.length) continue;
    const g = document.createElement("div"); g.className = "group"; g.textContent = group;
    box.appendChild(g);
    hits.forEach(c => addBtn(box, c));
  }
}
function updatePinBtn(){
  const b = document.getElementById("pinbtn");
  if (!b || !current) return;
  const pinned = store("akcli-pins", []).includes(current.name);
  b.textContent = pinned ? "★ pinned" : "☆ pin";
}

/* ---------------- form ------------------------------------------------- */
function select(c){
  current = c;
  document.getElementById("empty").style.display = "none";
  document.getElementById("page").style.display = "block";
  document.getElementById("title").innerHTML =
    esc(c.name + " — " + c.title) +
    ' <button id="pinbtn" onclick="pinToggle(current.name)" style="font:11px monospace;background:none;border:1px solid var(--border);color:var(--accent2);border-radius:4px;cursor:pointer;padding:2px 8px;vertical-align:middle">☆ pin</button>' +
    ' <button id="linkbtn" onclick="copyLink()" style="font:11px monospace;background:none;border:1px solid var(--border);color:var(--accent2);border-radius:4px;cursor:pointer;padding:2px 8px;vertical-align:middle">copy link</button>';
  setTimeout(updatePinBtn, 0);
  document.getElementById("ref").innerHTML = "Reference: <b>" + esc(c.reference) + "</b>";
  document.getElementById("notes").textContent = c.notes || "";
  document.getElementById("error").textContent = "";
  document.getElementById("results").innerHTML = "";
  const f = document.getElementById("form");
  f.innerHTML = "";
  for (const p of c.params){
    const row = document.createElement("div"); row.className = "prow";
    const lab = document.createElement("label");
    lab.innerHTML = esc(p.name) + (p.required ? ' <span class="req">*</span>' : "");
    row.appendChild(lab);
    let inp;
    if (p.choices.length){
      inp = document.createElement("select");
      if (!p.required){ }
      for (const ch of p.choices){
        const o = document.createElement("option"); o.value = ch; o.textContent = ch;
        if (ch === p.default) o.selected = true;
        inp.appendChild(o);
      }
      if (p.default === "" || (p.required && !p.choices.includes(p.default))){
        const o = document.createElement("option"); o.value=""; o.textContent="—"; o.selected=true;
        inp.insertBefore(o, inp.firstChild);
      }
    } else {
      inp = document.createElement("input");
      inp.placeholder = p.default !== null && p.default !== "" ? String(p.default) : (p.required ? "required" : "");
      inp.onkeydown = e => { if (e.key === "Enter") run(); };
    }
    inp.dataset.param = p.name;
    row.appendChild(inp);
    const u = document.createElement("span"); u.className = "unit"; u.textContent = p.unit || "";
    row.appendChild(u);
    f.appendChild(row);
    const h = document.createElement("div"); h.className = "phelp"; h.textContent = p.help;
    f.appendChild(h);
  }
  drawDiagram(c.name, {});
  renderSide();
}

/* ---------------- run --------------------------------------------------- */
function copyLink(){
  const h = new URLSearchParams({calc: current.name});
  document.querySelectorAll("#form [data-param]").forEach(el => {
    if (el.value !== "") h.set(el.dataset.param, el.value);
  });
  const url = location.origin + location.pathname + "#" + h.toString();
  navigator.clipboard.writeText(url).then(() => {
    const b = document.getElementById("linkbtn");
    b.textContent = "copied!"; setTimeout(() => b.textContent = "copy link", 1200);
  });
}
async function run(){
  const params = new URLSearchParams({name: current.name});
  const inputs = {};
  document.querySelectorAll("#form [data-param]").forEach(el => {
    if (el.value !== "") { params.set(el.dataset.param, el.value); inputs[el.dataset.param] = el.value; }
  });
  noteRecent(current.name);
  const share = new URLSearchParams({calc: current.name, ...inputs});
  history.replaceState(null, "", "#" + share.toString());
  const r = await fetch("/api/run?" + params.toString());
  const doc = await r.json();
  const err = document.getElementById("error"), res = document.getElementById("results");
  if (doc.error){ err.textContent = "ERROR: " + doc.error; res.innerHTML = ""; return; }
  err.textContent = "";
  let html = "<table><tr><th>result</th><th>value</th><th></th></tr>";
  for (const [k, cell] of Object.entries(doc.results)){
    let val;
    if (Array.isArray(cell.value)) val = renderList(cell.value);
    else if (typeof cell.value === "boolean") val = cell.value
        ? '<span style="color:var(--ok)">yes</span>' : '<span style="color:var(--err)">NO</span>';
    else val = esc(fmt(cell.value, cell.unit));
    html += `<tr><td>${esc(k)}</td><td class="val">${val}</td><td class="note">${esc(cell.note||"")}</td></tr>`;
  }
  html += "</table>";
  res.innerHTML = html;
  drawDiagram(current.name, {inputs, results: doc.results});
}
function renderList(list){
  if (!list.length) return "—";
  if (typeof list[0] !== "object") return esc(list.join(" · "));
  const cols = Object.keys(list[0]);
  let h = '<table class="subtable"><tr>' + cols.map(c=>`<th>${esc(c)}</th>`).join("") + "</tr>";
  for (const row of list)
    h += "<tr>" + cols.map(c=>`<td>${esc(typeof row[c]==="number" ? Number(row[c].toPrecision(6)) : row[c])}</td>`).join("") + "</tr>";
  return h + "</table>";
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ---------------- SVG diagrams (physical style) ------------------------- */
const C = { cu:"#d9903f", cuDark:"#a86a24", board:"#2f6b3f", boardDark:"#245233",
            dim:"#8be0ff", wire:"#7fd0ff", body:"#3a3f44", plane:"#8a8f94" };
const DEFS = `<defs><marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="${C.dim}"/></marker></defs>`;
function dim(x1,y1,x2,y2,label,lx,ly){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${C.dim}" stroke-width="1.3" marker-start="url(#ar)" marker-end="url(#ar)"/>
          <text x="${lx}" y="${ly}" fill="${C.dim}" font-size="13" text-anchor="middle">${label}</text>`;
}
function svg(inner, w=420, h=250){ return `<svg viewBox="0 0 ${w} ${h}" width="${w}">${DEFS}${inner}</svg>`; }
function rbox(x,y,w,h,label){ return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="none" stroke="${C.wire}" stroke-width="1.6"/><text x="${x+w/2}" y="${y+h/2+4}" fill="${C.wire}" font-size="12" text-anchor="middle">${label}</text>`; }
function wire(pts){ return `<polyline points="${pts}" fill="none" stroke="${C.wire}" stroke-width="1.6"/>`; }
function gnd(x,y){ return `<line x1="${x}" y1="${y}" x2="${x}" y2="${y+8}" stroke="${C.wire}" stroke-width="1.6"/><line x1="${x-10}" y1="${y+8}" x2="${x+10}" y2="${y+8}" stroke="${C.wire}" stroke-width="2"/><line x1="${x-6}" y1="${y+12}" x2="${x+6}" y2="${y+12}" stroke="${C.wire}" stroke-width="2"/><line x1="${x-2}" y1="${y+16}" x2="${x+2}" y2="${y+16}" stroke="${C.wire}" stroke-width="2"/>`; }
function label(x,y,t,anchor="middle",col=C.wire,size=13){ return `<text x="${x}" y="${y}" fill="${col}" font-size="${size}" text-anchor="${anchor}">${t}</text>`; }

const traceXsec = svg(`
  <rect x="40" y="120" width="340" height="60" fill="${C.board}" stroke="${C.boardDark}"/>
  <polygon points="150,120 270,120 262,96 158,96" fill="${C.cu}" stroke="${C.cuDark}"/>
  ${dim(150,86,270,86,"width W",210,78)}
  ${dim(292,96,292,120,"H (Cu)",332,112)}
  ${label(210,205,"substrate (FR-4)",'middle',C.dim,12)}
  ${label(210,40,"I → heat: I = k·ΔT^0.44·A^0.725 (IPC-2221)",'middle',C.dim,12)}`);

const DIAGRAMS = {
  trackwidth: traceXsec, trackcurrent: traceXsec,
  clearance: svg(`
    <rect x="30" y="90" width="360" height="90" fill="${C.board}" stroke="${C.boardDark}"/>
    <rect x="70" y="110" width="110" height="50" rx="6" fill="${C.cu}" stroke="${C.cuDark}"/>
    <rect x="240" y="110" width="110" height="50" rx="6" fill="${C.cu}" stroke="${C.cuDark}"/>
    ${label(125,140,"V1","middle","#222",14)} ${label(295,140,"V2","middle","#222",14)}
    ${dim(180,135,240,135,"",0,0)} ${label(210,124,"clearance",'middle',C.dim)}
    ${label(210,205,"IPC-2221B Table 6-1 · columns B1–B4, A5–A7",'middle',C.dim,12)}`),
  via: svg(`
    <rect x="30" y="70" width="200" height="120" fill="${C.board}" stroke="${C.boardDark}"/>
    <rect x="100" y="70" width="12" height="120" fill="${C.cu}"/>
    <rect x="148" y="70" width="12" height="120" fill="${C.cu}"/>
    <rect x="88" y="62" width="84" height="9" fill="${C.cu}"/>
    <rect x="88" y="189" width="84" height="9" fill="${C.cu}"/>
    ${dim(112,150,148,150,"d",130,144)}
    ${dim(250,62,250,198,"L",262,134)}
    <circle cx="330" cy="110" r="42" fill="${C.cu}"/>
    <circle cx="330" cy="110" r="28" fill="${C.bg||"#232629"}" stroke="${C.cuDark}"/>
    ${dim(330,66,330,82,"T",348,76)}
    ${label(330,180,"top view",'middle',C.dim,12)}
    ${label(130,230,"barrel: R=ρL/A · L≈5.08h(ln(4h/d)+1) nH",'middle',C.dim,11)}`),
  microstrip: svg(`
    <rect x="40" y="170" width="340" height="16" fill="${C.plane}"/>
    <rect x="40" y="110" width="340" height="60" fill="${C.board}" stroke="${C.boardDark}"/>
    <rect x="170" y="96" width="80" height="14" fill="${C.cu}" stroke="${C.cuDark}"/>
    ${dim(170,86,250,86,"w",210,78)}
    ${dim(300,110,300,170,"h",315,144)}
    ${label(90,145,"εr",'middle',C.dim)}
    ${label(210,220,"ground plane · Hammerstad–Jensen 1980",'middle',C.dim,12)}`),
  stripline: svg(`
    <rect x="40" y="60" width="340" height="14" fill="${C.plane}"/>
    <rect x="40" y="186" width="340" height="14" fill="${C.plane}"/>
    <rect x="40" y="74" width="340" height="112" fill="${C.board}" stroke="${C.boardDark}"/>
    <rect x="175" y="123" width="70" height="12" fill="${C.cu}" stroke="${C.cuDark}"/>
    ${dim(175,112,245,112,"w",210,105)}
    ${dim(310,74,310,186,"b",325,134)}
    ${label(90,135,"εr",'middle',C.dim)}
    ${label(210,232,"Cohn 1954 · exact (elliptic integrals)",'middle',C.dim,12)}`),
  coax: svg(`
    <circle cx="210" cy="125" r="90" fill="${C.plane}"/>
    <circle cx="210" cy="125" r="76" fill="${C.board}"/>
    <circle cx="210" cy="125" r="22" fill="${C.cu}" stroke="${C.cuDark}"/>
    ${dim(210,103,210,50,"",0,0)} ${label(232,72,"D",'middle',C.dim)}
    ${dim(188,125,232,125,"d",210,118)}
    ${label(210,235,"Z0 = (η0/2π√εr)·ln(D/d)",'middle',C.dim,12)}`),
  twinlead: svg(`
    <circle cx="140" cy="120" r="34" fill="${C.cu}" stroke="${C.cuDark}"/>
    <circle cx="280" cy="120" r="34" fill="${C.cu}" stroke="${C.cuDark}"/>
    ${dim(140,170,280,170,"spacing D",210,192)}
    ${dim(106,90,174,90,"d",140,80)}
    ${label(210,230,"Z0 = (η0/π√εr)·acosh(D/d)",'middle',C.dim,12)}`),
  awg: svg(`
    <circle cx="210" cy="120" r="70" fill="${C.cu}" stroke="${C.cuDark}" stroke-width="2"/>
    ${label(210,126,"Cu","middle","#222",16)}
    ${dim(140,120,280,120,"",0,0)} ${label(210,102,"d = 0.127·92^((36−n)/39) mm",'middle',C.dim,12)}
    ${label(210,225,"ASTM B258-18",'middle',C.dim,12)}`),
  fusing: svg(`
    <rect x="40" y="120" width="340" height="50" fill="${C.board}" stroke="${C.boardDark}"/>
    <rect x="60" y="108" width="120" height="14" fill="${C.cu}"/>
    <rect x="240" y="108" width="120" height="14" fill="${C.cu}"/>
    <path d="M180,115 Q195,95 210,115 Q225,135 240,115" stroke="#ff5544" stroke-width="4" fill="none"/>
    <path d="M195,88 q4,-10 0,-18 M210,92 q4,-10 0,-18 M225,88 q4,-10 0,-18" stroke="#ffb14e" stroke-width="2" fill="none"/>
    ${label(210,205,"adiabatic fusing: Onderdonk 1928 · steady: Preece 1884",'middle',C.dim,12)}`),
  wavelength: svg(`
    <path d="M40,120 C70,50 100,50 130,120 S190,190 220,120 S280,50 310,120 S355,175 380,132" stroke="${C.wire}" stroke-width="2" fill="none"/>
    ${dim(40,190,220,190,"λ",130,212)}
    ${label(210,50,"v = c/√εr",'middle',C.dim)}`),
  attenuator: svg(`
    ${wire("30,100 140,100")} ${rbox(140,84,60,32,"R series")} ${wire("200,100 390,100")}
    ${wire("110,100 110,140")} ${rbox(92,140,36,44,"R sh")} ${gnd(110,184)}
    ${wire("310,100 310,140")} ${rbox(292,140,36,44,"R sh")} ${gnd(310,184)}
    ${label(30,90,"in","start")} ${label(390,90,"out","end")}
    ${label(210,230,"PI topology (TEE/bridged-tee mirror it)",'middle',C.dim,12)}`),
  ohm: svg(`
    ${wire("100,70 320,70 320,110")} ${rbox(302,110,36,50,"R")} ${wire("320,160 320,190 100,190 100,145")}
    <line x1="85" y1="130" x2="115" y2="130" stroke="${C.wire}" stroke-width="2.5"/>
    <line x1="93" y1="145" x2="107" y2="145" stroke="${C.wire}" stroke-width="2"/>
    ${wire("100,70 100,130")}
    ${label(70,110,"V","middle")} ${label(360,138,"I→","start",C.dim)}
    ${label(210,230,"V = I·R · P = V·I",'middle',C.dim,12)}`),
  vdivider: svg(`
    ${label(210,40,"Vin","middle")} ${wire("210,48 210,70")} ${rbox(192,70,36,52,"R top")}

function drawDiagram(name, ctx){
  const box = document.getElementById("diagram");
  box.innerHTML = DIAGRAMS[name] || FALLBACK;
  document.getElementById("diagcap").textContent =
    DIAGRAMS[name] ? "" : "no dedicated illustration yet";
  // dynamic touches
  if (name === "rescolor" && ctx.results && ctx.results.bands_list){
    const bands = ctx.results.bands_list.value;
    const cmap = {black:"#111",brown:"#6b3d1f",red:"#c0392b",orange:"#e67e22",yellow:"#f1c40f",
                  green:"#27ae60",blue:"#2980b9",violet:"#8e44ad",grey:"#95a5a6",white:"#ecf0f1",
                  gold:"#c9a227",silver:"#bdc3c7"};
    bands.forEach((b,i)=>{ const el = document.getElementById("band"+i); if (el) el.setAttribute("fill", cmap[b]||"#666"); });
  }
  if (name === "smdcode" && ctx.inputs && ctx.inputs.code){
    const t = document.getElementById("smdtext"); if (t) t.textContent = ctx.inputs.code.toUpperCase();
  }
}
